version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-instance-1
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - '3000'

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-instance-2
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - '3000'

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-instance-3
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    container_name: nginx-balancer
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
